<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Riddle Redemption Setup</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        max-width: 920px;
        margin: 0 auto;
        padding: 32px 18px;
        color: #18221f;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #fbfaf6;
      }

      h1 {
        margin: 0 0 8px;
      }

      p {
        color: #66736d;
        line-height: 1.5;
      }

      label {
        display: block;
        margin: 18px 0 8px;
        font-weight: 800;
      }

      input,
      textarea,
      button {
        width: 100%;
        border-radius: 6px;
        font: inherit;
      }

      input,
      textarea {
        border: 1px solid #d8dfdb;
        padding: 12px;
        background: #fff;
      }

      textarea {
        min-height: 110px;
        resize: vertical;
      }

      button {
        min-height: 48px;
        margin-top: 18px;
        border: 0;
        color: #fff;
        font-weight: 800;
        background: #0b6b5c;
        cursor: pointer;
      }

      pre {
        overflow-x: auto;
        padding: 16px;
        border: 1px solid #d8dfdb;
        border-radius: 6px;
        background: #fff;
      }
    </style>
  </head>
  <body>
    <h1>Riddle Redemption Setup</h1>
    <p>Use this locally to generate the CONFIG block for <code>script.js</code>. The answer becomes the decryption key for the redemption text.</p>

    <form id="setup-form">
      <label for="title">Page title</label>
      <input id="title" value="Riddle Redemption" required>

      <label for="riddle">Riddle</label>
      <textarea id="riddle" required>I open only for the phrase chosen by the keeper. What is the code?</textarea>

      <label for="hint">Hint, optional</label>
      <input id="hint" value="">

      <label for="code">Correct code</label>
      <input id="code" autocomplete="off" spellcheck="false" required>

      <label for="reward">Redemption text</label>
      <textarea id="reward" required></textarea>

      <button type="submit">Generate CONFIG</button>
    </form>

    <h2>Output</h2>
    <p>Replace the CONFIG object at the top of <code>script.js</code> with this output.</p>
    <pre id="output"></pre>

    <script>
      const form = document.querySelector("#setup-form");
      const output = document.querySelector("#output");

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        output.textContent = "Generating...";

        const code = normalizeCode(document.querySelector("#code").value);
        const reward = document.querySelector("#reward").value;
        const verifierSalt = crypto.getRandomValues(new Uint8Array(16));
        const keySalt = crypto.getRandomValues(new Uint8Array(16));
        const iv = crypto.getRandomValues(new Uint8Array(12));
        const verifierIterations = 150000;
        const keyIterations = 250000;

        const verifierHash = await pbkdf2Hash(code, verifierSalt, verifierIterations);
        const key = await deriveAesKey(code, keySalt, keyIterations);
        const encrypted = await crypto.subtle.encrypt(
          { name: "AES-GCM", iv },
          key,
          new TextEncoder().encode(reward)
        );

        const config = {
          title: document.querySelector("#title").value,
          riddle: document.querySelector("#riddle").value,
          hint: document.querySelector("#hint").value,
          verifierIterations,
          verifierSaltB64: bytesToBase64(verifierSalt),
          verifierHashB64: bytesToBase64(new Uint8Array(verifierHash)),
          keyIterations,
          keySaltB64: bytesToBase64(keySalt),
          rewardIvB64: bytesToBase64(iv),
          rewardCiphertextB64: bytesToBase64(new Uint8Array(encrypted))
        };

        output.textContent = `const CONFIG = ${JSON.stringify(config, null, 2)};`;
      });

      function normalizeCode(value) {
        return value.trim().toLowerCase();
      }

      async function deriveAesKey(code, salt, iterations) {
        const keyMaterial = await crypto.subtle.importKey(
          "raw",
          new TextEncoder().encode(code),
          "PBKDF2",
          false,
          ["deriveKey"]
        );

        return crypto.subtle.deriveKey(
          { name: "PBKDF2", hash: "SHA-256", salt, iterations },
          keyMaterial,
          { name: "AES-GCM", length: 256 },
          false,
          ["encrypt"]
        );
      }

      async function pbkdf2Hash(code, salt, iterations) {
        const keyMaterial = await crypto.subtle.importKey(
          "raw",
          new TextEncoder().encode(code),
          "PBKDF2",
          false,
          ["deriveBits"]
        );

        return crypto.subtle.deriveBits(
          { name: "PBKDF2", hash: "SHA-256", salt, iterations },
          keyMaterial,
          256
        );
      }

      function bytesToBase64(bytes) {
        let binary = "";
        bytes.forEach((byte) => {
          binary += String.fromCharCode(byte);
        });
        return btoa(binary);
      }
    </script>
  </body>
</html>
